# netlify.toml — Sugartown Storybook (pinkmoon.sugartown.io)
#
# Separate Netlify site for the design system reference.
# Deployment:
#   1. Create a new site in the Netlify dashboard
#   2. Set base directory: apps/storybook
#   3. Build command: pnpm storybook:build
#   4. Publish directory: apps/storybook/storybook-static
#   5. Add custom domain: pinkmoon.sugartown.io
#
# Build triggers:
#   - Auto-deploy on push to main (or configure manual-only
#     to conserve deploy credits — set in dashboard)

[build]
  base = "apps/storybook"
  command = "cd ../.. && pnpm install --frozen-lockfile && cd apps/storybook && pnpm storybook:build"
  publish = "storybook-static"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "9.1.0"

# SPA fallback — Storybook uses client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
