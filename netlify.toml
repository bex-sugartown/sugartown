# netlify.toml — Sugartown
#
# Build settings are configured in the Netlify dashboard (base: apps/web,
# command: pnpm build, publish: apps/web/dist).
#
# Per-URL slug redirects (WP taxonomy archives) live in apps/web/public/_redirects,
# generated at build time by apps/web/scripts/build-redirects.js from Sanity
# redirect documents.

# ─── WP query-parameter redirects — REMOVED 2026-03-20 ────────────────────────
#
# Three [[redirects]] rules with query = {} conditions (/?p=, /?cat=, /?tag=)
# were defined here but never fired in practice. Netlify processes _redirects
# before netlify.toml; the SPA catch-all (/* /index.html 200) matched first
# and shadowed these rules.
#
# If Search Console shows 404 traffic on /?p=, /?cat=, or /?tag= patterns,
# the fix is a Netlify Edge Function (runs before _redirects), not this file.
# See: docs/reports/hosting-evaluation.md §Query-param redirects.
