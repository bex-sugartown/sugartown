<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sugartown-frontend</title>
    <!-- Google Fonts: authoritative <link> instead of CSS @import -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Fira+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Hidden form for Netlify deploy-time detection (SPA pattern) -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
    </form>
    <div id="root"></div>
    <!-- Theme init: read persisted preference before first paint to avoid FOUC -->
    <script>
      (function () {
        var t = localStorage.getItem('st-theme')
        document.documentElement.setAttribute(
          'data-theme',
          t === 'light' || t === 'dark' ? t : 'dark'
        )
      })()
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
