<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sugartown Digital</title>
    <meta name="description" content="Product Management for CMS, design systems, and e-commerce. Ex-Sephora, Estée Lauder. Currently shipping a portfolio site built like an enterprise platform." />
    <!-- Google Analytics (gtag.js) — suppressed on localhost/dev -->
    <script>
      (function () {
        var h = location.hostname;
        if (h === 'localhost' || h === '127.0.0.1' || h.endsWith('.local')) return;
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-00MF2Q9YJW';
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-00MF2Q9YJW');
        window.gtag = gtag;
      })();
    </script>
    <!-- Google Fonts: authoritative <link> for Pink Moon (SUG-21) font stack.
         EB Garamond (headings/narrative), Fira Sans (body/UI), Courier Prime (mono labels).
         <link rel="stylesheet"> is loaded in parallel with JS, earlier than CSS @import. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700;800&family=Fira+Sans:wght@400;500;600;700&family=Courier+Prime:wght@400;700&display=optional" rel="stylesheet">
  </head>
  <body>
    <!-- Hidden form for Netlify deploy-time detection (SPA pattern) -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" data-netlify-recaptcha="true" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
    </form>
    <div id="root"></div>
    <!-- Theme init: read persisted preference before first paint to avoid FOUC -->
    <!-- Pink Moon is the primary DS identity. Default: light-pink-moon. -->
    <script>
      (function () {
        var t = localStorage.getItem('st-theme')
        var valid = ['light-pink-moon', 'dark-pink-moon', 'light', 'dark']
        document.documentElement.setAttribute(
          'data-theme',
          valid.indexOf(t) !== -1 ? t : 'light-pink-moon'
        )
      })()
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
